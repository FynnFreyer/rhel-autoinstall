# Sample KS file derived from one generated by Anaconda
#version=RHEL10

%addon com_redhat_kdump --enable --reserve-mb='auto'

%end

# Keyboard layouts
keyboard --vckeymap=de --xlayouts='de'
# System language
lang en_US.UTF-8

# Network information
# --device=link picks the first interface that has connectivity
network  --bootproto=dhcp --device=link --ipv6=auto --activate
# TODO: hostname needs to be changed
network  --hostname=my-system

# Dynamic Network Installation Sources
url --mirrorlist="https://mirrors.rockylinux.org/mirrorlist?repo=rocky-BaseOS-$releasever&arch=$basearch"
repo --name="AppStream" --mirrorlist="https://mirrors.rockylinux.org/mirrorlist?repo=rocky-AppStream-$releasever&arch=$basearch"

%packages
@^minimal-environment
clevis-dracut
clevis-luks
clevis-systemd
%end

# Run the Setup Agent on first boot
firstboot --enable

# Create disk partitions
# TODO: Device nvme0n1 needs to be changed according to hardware
ignoredisk --only-use=nvme0n1
autopart --encrypted --passphrase=temppass
# Partition clearing information
clearpart --all --initlabel

# System timezone
timezone Europe/Berlin --utc

# Lock root and create admin user
# TODO: Username and encrypted password needs to be set
rootpw --lock
user --groups=wheel --name=user --password=<crypt-pw> --iscrypted

%post --log=/root/ks-post-clevis.log
# Dynamically find and bind all LUKS devices to TPM2
for dev in $(blkid -t TYPE=crypto_LUKS -o device); do
    echo "Binding $dev to TPM2..."
    clevis luks bind -d "$dev" \
        tpm2 '{"hash":"sha256","key":"rsa"}' \
        <<< "temppass"
    echo "Removing temporary LUKS key from $dev"
    cryptsetup luksRemoveKey "$dev" <<< "temppass"
done

dracut -fv --regenerate-all
%end
