# Sample KS file derived from one generated by Anaconda
#version=RHEL10

%addon com_redhat_kdump --enable --reserve-mb='auto'

%end

# Keyboard layouts
keyboard --vckeymap=de --xlayouts='de'
# System language
lang en_US.UTF-8

# Network information
# TODO: hostname needs to be changed
network  --bootproto=dhcp --device=enp2s0 --ipv6=auto --activate
network  --hostname=my-system

%packages
@^minimal-environment
clevis-dracut
clevis-luks
clevis-systemd
%end

# Run the Setup Agent on first boot
firstboot --enable

# Create disk partitions
# TODO: Device nvme0n1 needs to be changed according to hardware
ignoredisk --only-use=nvme0n1
autopart --encrypted --passphrase=temppass
# Partition clearing information
clearpart --none --initlabel

# System timezone
timezone Europe/Berlin --utc

# Lock root and create admin user
# TODO: Username and encrypted password needs to be set
rootpw --lock
user --groups=wheel --name=user --password=<crypt-pw> --iscrypted

# TODO: Device /dev/nvme0n1p3 needs to be changed according to hardware
%post
clevis luks bind -d /dev/nvme0n1p3 \
  tpm2 '{"hash":"sha256","key":"rsa"}'  <<< "temppass"
cryptsetup luksRemoveKey /dev/nvme0n1p3 <<< "temppass"
dracut -fv --regenerate-all
%end
